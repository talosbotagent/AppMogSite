<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" fill="none">
  <defs>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#08080c"/>
  <rect x="1" y="1" width="510" height="510" rx="95" fill="none" stroke="#00e5ff" stroke-width="1" opacity="0.12"/>
  
  <!-- APP - small, spaced, uppercase -->
  <text x="256" y="190" text-anchor="middle" font-family="'IBM Plex Mono', 'JetBrains Mono', 'Courier New', monospace" font-size="36" fill="#00e5ff" font-weight="300" letter-spacing="24" opacity="0.7">
    APP
  </text>
  
  <!-- Thin divider -->
  <line x1="140" y1="216" x2="372" y2="216" stroke="#00e5ff" stroke-width="0.75" opacity="0.25"/>
  
  <!-- MOG - large, bold, dominant -->
  <text x="256" y="320" text-anchor="middle" font-family="'IBM Plex Mono', 'JetBrains Mono', 'Courier New', monospace" font-size="96" fill="#d4d4d8" font-weight="700" letter-spacing="8">
    MOG
  </text>
  
  <!-- Single dot accent -->
  <circle cx="256" cy="390" r="6" fill="#00e5ff" opacity="0.5" filter="url(#softGlow)"/>
  
  <!-- Subtle corner marks -->
  <line x1="40" y1="40" x2="70" y2="40" stroke="#00e5ff" stroke-width="0.5" opacity="0.2"/>
  <line x1="40" y1="40" x2="40" y2="70" stroke="#00e5ff" stroke-width="0.5" opacity="0.2"/>
  
  <line x1="472" y1="472" x2="442" y2="472" stroke="#00e5ff" stroke-width="0.5" opacity="0.2"/>
  <line x1="472" y1="472" x2="472" y2="442" stroke="#00e5ff" stroke-width="0.5" opacity="0.2"/>
</svg>
